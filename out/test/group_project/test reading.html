<!DOCTYPE html>
<html>
<head>
    <title>每行两列的表格</title>
    <style>
        table, th, td {
            border: 1px solid black; /* 添加边框以便查看表格结构 */
            border-collapse: collapse; /* 合并边框 */
        }
        th, td {
            padding: 8px; /* 添加内边距 */
            text-align: left; /* 文本左对齐 */
        }
    </style>
</head>
<body>

<h2>test sample</h2>

<table>
    <tr>
        <td>first line column</td>
        <td>first line second column</td>
    </tr>
    <tr>
        <td>second line second column</td>
        <td>second line second column</td>
    </tr>
    <tr>
        <td>third line first column</td>
        <td>third line second column</td>
    </tr>
</table>

</body>
</html>
